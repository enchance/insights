services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    develop:
      watch:
        - action: rebuild
          path: ./backend/Dockerfile
        - action: rebuild
          path: ./backend/requirements.txt
    command: bash -lc "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "yarn install && yarn dev --host"
    restart: unless-stopped
